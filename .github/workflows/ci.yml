name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-validate:
    name: build demo + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- R (stage 1: pzfx) -------------------------------------------------
      - name: System libs for xml2 (pzfx dependency)
        run: sudo apt-get update && sudo apt-get install -y libxml2-dev

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true   # CRAN binaries for Ubuntu -> fast, no compiling

      - name: Install R package (pzfx)
        run: Rscript -e 'install.packages("pzfx"); stopifnot(requireNamespace("pzfx", quietly=TRUE))'

      # ---- Python (stage 2: prismWriter) ------------------------------------
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps (pandas + prismWriter)
        run: pip install -r requirements.txt

      # ---- Run the bundled synthetic demo (R -> Python, full pipeline) -------
      - name: Build demo .pzfx (Column/XY + native Two-Way + heatmap + combined)
        run: python build_prism.py --root examples --out examples/out --combined

      - name: Validate all outputs (fails on any integrity / cell issue)
        run: python build_prism.py --root examples --out examples/out --validate-only

      - name: Show validation report
        if: always()
        run: cat examples/out/VALIDATION.md || true

      - name: Upload generated Prism files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-pzfx
          path: examples/out/*.pzfx
          if-no-files-found: warn
